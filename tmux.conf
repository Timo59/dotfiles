# =============================================================================
# tmux Configuration
# =============================================================================
# Optimized for LaTeX writing workflow with neovim
# =============================================================================

# -----------------------------------------------------------------------------
# General Settings
# -----------------------------------------------------------------------------

# Use 256 colors
# Note: Terminal.app doesn't support true color - disable RGB feature
# that tmux 3.6+ enables by default for xterm-256color
set -g default-terminal "tmux-256color"
set -as terminal-overrides ',xterm-256color:RGB@'
# set -ag terminal-overrides ",xterm-256color:RGB"  # uncomment if using iTerm2/Kitty/Alacritty

# Enable mouse support
set -g mouse on

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Increase scrollback buffer
set -g history-limit 50000

# Faster key repetition
set -s escape-time 0

# Focus events for vim autoread
set -g focus-events on

# Refresh status more often
set -g status-interval 5

# -----------------------------------------------------------------------------
# Prefix Key
# -----------------------------------------------------------------------------

# Use Ctrl-a instead of Ctrl-b (easier to reach)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# -----------------------------------------------------------------------------
# Key Bindings
# -----------------------------------------------------------------------------

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Split panes using | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Navigate panes with vim keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Also allow Ctrl + vim keys for pane navigation
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# Resize panes with Shift + vim keys
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window navigation
bind -n M-h previous-window
bind -n M-l next-window

# Create new window in current path
bind c new-window -c "#{pane_current_path}"

# Quick window switching
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5

# Toggle last window
bind Tab last-window

# Kill pane without confirmation
bind x kill-pane

# Kill window without confirmation
bind X kill-window

# Sync panes (type in all panes at once)
bind S setw synchronize-panes

# -----------------------------------------------------------------------------
# Copy Mode (vim-like)
# -----------------------------------------------------------------------------

setw -g mode-keys vi

# Enter copy mode with prefix + [
bind [ copy-mode

# Vim-like selection
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy"

# Paste with prefix + p
bind p paste-buffer

# -----------------------------------------------------------------------------
# Status Bar
# -----------------------------------------------------------------------------

# Status bar position
set -g status-position bottom

# Status bar colors
set -g status-style "bg=#1a1b26,fg=#a9b1d6"

# Left side: session name
set -g status-left-length 30
set -g status-left "#[fg=#7aa2f7,bold] #S #[fg=#565f89]│ "

# Right side: date and time
set -g status-right-length 50
set -g status-right "#[fg=#565f89]│ #[fg=#a9b1d6]%H:%M #[fg=#565f89]│ #[fg=#a9b1d6]%d %b "

# Window status
set -g window-status-format "#[fg=#565f89] #I:#W "
set -g window-status-current-format "#[fg=#7aa2f7,bold] #I:#W "

# Pane borders
set -g pane-border-style "fg=#565f89"
set -g pane-active-border-style "fg=#7aa2f7"

# Message style
set -g message-style "bg=#1a1b26,fg=#7aa2f7"

# -----------------------------------------------------------------------------
# Session Management
# -----------------------------------------------------------------------------

# Quick session switching
bind s choose-tree -Zs

# New session
bind N new-session

# -----------------------------------------------------------------------------
# Layouts for LaTeX Writing
# -----------------------------------------------------------------------------

# Layout: Editor + Terminal (vertical split)
# Usage: prefix + E
bind E split-window -h -p 30 -c "#{pane_current_path}" \; select-pane -L

# Layout: Editor + Two terminals (one for compile, one for git/misc)
# Usage: prefix + T
bind T split-window -h -p 30 -c "#{pane_current_path}" \; \
       split-window -v -p 50 -c "#{pane_current_path}" \; \
       select-pane -L
